<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 500 200" role="img" aria-label="TerrOir">
  <defs>
    <clipPath id="terroir-o-inner">
      <ellipse cx="250" cy="100" rx="41" ry="71" />
    </clipPath>
  </defs>

  <!-- Texte gauche "Terr" -->
  <text x="192" y="140" font-family="Georgia, 'Times New Roman', serif" font-weight="400" font-size="110" fill="#2D6A4F" text-anchor="end">Terr</text>

  <!-- Texte droite "ir" -->
  <text x="308" y="140" font-family="Georgia, 'Times New Roman', serif" font-weight="400" font-size="110" fill="#2D6A4F" text-anchor="start">ir</text>

  <!-- Rivière terracotta ondulante, clipée à l'intérieur du O -->
  <g clip-path="url(#terroir-o-inner)">
    <path
      fill="#A0522D"
      d="M 200 90
         Q 212.5 75 225 90
         Q 237.5 105 250 90
         Q 262.5 75 275 90
         Q 287.5 105 300 90
         L 300 102
         Q 287.5 117 275 102
         Q 262.5 87 250 102
         Q 237.5 117 225 102
         Q 212.5 87 200 102
         Z"
    />
  </g>

  <!-- Grand O en vert, par-dessus la rivière -->
  <ellipse cx="250" cy="100" rx="48" ry="78" fill="none" stroke="#2D6A4F" stroke-width="14" />
</svg>
